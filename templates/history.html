<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>分析履歴 | 市場・競合分析 AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: #f0f4f8; color: #1a202c; }
    header { background: #1a365d; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; }
    .nav { display: flex; gap: 12px; }
    .nav a { color: white; text-decoration: none; font-size: 13px; padding: 6px 14px; border: 1px solid rgba(255,255,255,.4); border-radius: 6px; }
    .nav a:hover { background: rgba(255,255,255,.1); }
    .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
    .card-header { padding: 20px 24px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .card-header h2 { font-size: 15px; font-weight: 700; color: #2d3748; }
    .btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; text-decoration: none; cursor: pointer; font-family: inherit; border: none; }
    .btn-primary { background: #2b6cb0; color: white; }
    .btn-primary:hover { background: #2c5282; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f7fafc; font-size: 12px; font-weight: 600; color: #718096; padding: 10px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fafc; }
    .link { color: #2b6cb0; text-decoration: none; font-weight: 600; }
    .link:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 60px; color: #a0aec0; font-size: 14px; }
  </style>
</head>
<body>
<header>
  <h1>分析履歴</h1>
  <div class="nav">
    <a href="/">新規分析</a>
    <a href="/export">CSVダウンロード</a>
  </div>
</header>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>過去の分析一覧（{{ rows|length }}件）</h2>
    </div>
    {% if rows %}
    <table>
      <thead>
        <tr>
          <th>日時</th>
          <th>企業名</th>
          <th>業種</th>
          <th>企業規模</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.created_at }}</td>
          <td>{{ row.company_name }}</td>
          <td>{{ row.industry }}</td>
          <td>{{ row.company_size }}</td>
          <td><a class="link" href="/history/{{ row.id }}">レポートを見る →</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div class="empty">まだ分析結果がありません。<br><a href="/" style="color:#2b6cb0;">新規分析を始める</a></div>
    {% endif %}
  </div>
</div>
</body>
</html>
